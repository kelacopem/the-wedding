<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Kiara & Nana</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR STYLES — unchanged */
:root {
  --soft-black: #1a1a1a;
  --cherry: #5a0f1c;
  --violet: #2d0f3a;
  --soft-white: #f5f5f5;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: var(--soft-black);
  background-color: var(--soft-white);
}

/* HERO */
header {
  min-height: auto;
  padding: 40px 0;
  background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.7)),
              url('https://images.unsplash.com/photo-1529634896145-d3d4a9e5f3b4') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* NAV */
.monogram-banner {
  width: 100%;
  text-align: center;
  padding: 20px 0;
  background-color: var(--soft-white);
}

.monogram-banner img {
  width: 90px;
}

.subnav {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}

.subnav a {
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--soft-black);
  opacity: 0.85;
}

/* VIDEO */
.video-section {
  max-width: 100%;
  text-align: center;
}

.video-section video {
  width: 100%;
  max-width: 700px;
  height: auto;
  object-fit: contain;
  margin: 0 auto 10px;
  display: block;
}

.unmute-btn {
  margin: 15px auto 0;
  display: block;
  padding: 12px 24px;
  border: 1px solid var(--cherry);
  background: rgba(255,255,255,0.85);
  font-family: 'Playfair Display', serif;
  cursor: pointer;
}

/* DETAILS */
.details-section {
  background-color: #000;
  color: #fff;
  margin: 6px 0;
  padding: 60px 20px;
}

/* FOOTER */
footer {
  padding: 25px;
  font-size: 12px;
  letter-spacing: 2px;
  color: #aaa;
  text-align: center;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="password-screen">
  <div class="password-wrapper">
    <div class="password-box">
      <h2>Welcome</h2>
      <p>Please enter the password</p>
      <input type="password" id="password-input">
      <button onclick="checkPassword()">Enter</button>
      <p id="error-message"></p>
    </div>
    <img src="orchid-wreath.png" class="orchid-img">
  </div>
</div>

<!-- NAV -->
<div class="monogram-banner">
  <img src="monogram.png" alt="Monogram">
  <nav class="subnav">
    <a href="index.html">Home</a>
    <a href="our-story.html">Our Story</a>
    <a href="#">Details</a>
    <a href="#">Schedule</a>
    <a href="#">Travel</a>
    <a href="#">Gallery</a>
    <a href="wedding-party-login.html">Wedding Party</a>
    <a href="#">RSVP</a>
  </nav>
</div>

<!-- ✅ VIDEO (NOW IN CORRECT PLACE) -->
<section class="video-section">
  <video id="weddingvideo" autoplay muted loop playsinline>
    <source src="your-video.mp4" type="video/mp4">
  </video>
  <button class="unmute-btn" onclick="toggleSound()">Tap to Unmute</button>
</section>

<!-- HERO -->
<header>
  <div class="hero-box">
    <h1>Kiara & Nana</h1>
    <div class="date">AUGUST 14, 2026</div>
  </div>
</header>

<!-- DETAILS -->
<section class="details-section">
  <h2>The Details</h2>
  <p>Location: Bluemont, Virginia</p>
</section>

<footer>
  FORMAL INVITATION TO FOLLOW
</footer>

<!-- ✅ ALL SCRIPTS AT THE END -->
<script>
function checkPassword() {
  const correctPassword = "NK2026";
  const userInput = document.getElementById("password-input").value;

  if (userInput === correctPassword) {
    document.getElementById("password-screen").style.display = "none";
  } else {
    document.getElementById("error-message").innerText = "Incorrect password";
  }
}

function toggleSound() {
  const video = document.getElementById("weddingvideo");
  video.muted = false;
  video.play();
}
</script>

</body>
</html>
