<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiara & [Partner]</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
:root {
  --black: #0a0a0a;
  --cherry: #5a0f1c;
  --violet: #2d0f3a;
  --soft-white: #f5f5f5;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: var(--soft-white);
  background-color: var(--black);
}

/* HERO */
header {
  height: 100vh;
  background: linear-gradient(rgba(10,10,10,0.6), rgba(10,10,10,0.8)),
              url('https://images.unsplash.com/photo-1529634896145-d3d4a9e5f3b4') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero-box {
  padding: 50px;
  border: 1px solid var(--cherry);
  background: rgba(0,0,0,0.4);
}

.monogram {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
  color: var(--cherry);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin: 10px 0;
}

.date {
  letter-spacing: 3px;
  color: var(--violet);
}

/* COUNTDOWN */
#countdown {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 25px;
}

.time {
  border: 1px solid var(--violet);
  padding: 10px 15px;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

h2 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 20px;
  color: var(--cherry);
}

/* DETAILS */
.details p {
  margin: 8px 0;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  transition: 0.4s;
  filter: brightness(90%);
}

.gallery img:hover {
  transform: scale(1.03);
  filter: brightness(100%);
}

/* RSVP */
.rsvp a {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border: 1px solid var(--cherry);
  color: var(--soft-white);
  text-decoration: none;
  transition: 0.3s;
}

.rsvp a:hover {
  background: var(--cherry);
}

/* FOOTER */
footer {
  padding: 30px;
  font-size: 12px;
  letter-spacing: 2px;
  color: #aaa;
}
</style>
</head>

<body>

<!-- HERO -->
<header>
  <div class="hero-box">
    <div class="monogram">NK</div>
    <h1>Kiara & [Partner]</h1>
    <div class="date">JULY XX, 2026</div>

    <div id="countdown">
      <div class="time"><span id="days"></span>Days</div>
      <div class="time"><span id="hours"></span>Hours</div>
      <div class="time"><span id="minutes"></span>Minutes</div>
      <div class="time"><span id="seconds"></span>Seconds</div>
    </div>
  </div>
</header>

<!-- DETAILS -->
<section>
  <h2>The Details</h2>
  <div class="details">
    <p>Ceremony: Venue Name</p>
    <p>Location: City, State</p>
    <p>Time: 4:00 PM</p>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2>Our Story</h2>
  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
  </div>
</section>

<!-- RSVP -->
<section class="rsvp">
  <h2>RSVP</h2>
  <p>Please respond by June 2026</p>
  <a href="#">Respond Here</a>
</section>

<footer>
  FORMAL INVITATION TO FOLLOW
</footer>

<script>
const weddingDate = new Date("July 15, 2026 16:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = weddingDate - now;

  document.getElementById("days").innerText = Math.floor(d / (1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((d/(1000*60*60))%24);
  document.getElementById("minutes").innerText = Math.floor((d/(1000*60))%60);
  document.getElementById("seconds").innerText = Math.floor((d/1000)%60);
}, 1000);
</script>

</body>
</html>
