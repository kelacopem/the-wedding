<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Wedding Party Access</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: 'Playfair Display', serif;
      padding-top: 60px;
    }

    /* HEADER */
  .monogram-banner {
    width: 100%;
    text-align: center;
    padding: 20px 0;
    background-color: var(--soft-white);
}

  .monogram-banner img {
    width: 90px;
}

  .subnav {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
}

  .subnav a {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--soft-black);
    opacity: 0.85;
    white-space: nowrap;
    transition: 0.3s ease;
}

/* underline effect */
.subnav a::after {
  content: "";
  display: block;
  width: 0;
  height: 0.5px;
  background: var(--cherry);
  margin: 6px auto 0;
  transition: width 0.3s ease;
}

.subnav a:hover {
  color: var(--cherry);
  opacity: 1;
}

.subnav a:hover::after {
  width: 100%;
}

    /* LOGIN BOX */
    .login-box {
      margin-top: 60px;
    }

    input {
      padding: 10px;
      width: 220px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    #error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- ✅ GLOBAL HEADER (correct placement) -->
<div class="monogram-banner">
  <img src="monogram.png" alt="Monogram">

  <nav class="subnav">
    <a href="index.html">Home</a>
    <a href="our-story.html">Our Story</a>
    <a href="wedding-details.html" class="disabled">Details</a>
    <a href="schedule.html" class="disabled">Schedule</a>
    <a href="travel.html" class="disabled">Travel</a>
    <a href="gallery.html" class="disabled">Gallery</a>
    <a href="wedding-party.html">Wedding Party</a>
    <a href="rsvp.html" class="disabled">RSVP</a>
  </nav>
</div>

<!-- LOGIN SECTION -->
<div class="login-box">
  <h2>Wedding Party Access</h2>
  <p>Please enter your private password</p>

  <input type="password" id="party-password" placeholder="Enter Password">
  <br><br>
  <button onclick="checkPartyAccess()">Enter</button>

  <p id="error"></p>
</div>

<script>
function checkPartyAccess() {
  const input = document.getElementById("party-password").value;

  if (input === "BRIDE1") {
    window.location.href = "kiara.html";
  } 
  else if (input === "BRIDE2") {
    window.location.href = "maya.html";
  } 
  else if (input === "GROOM1") {
    window.location.href = "james.html";
  } 
  else {
    document.getElementById("error").innerText = "Incorrect password";
  }
}
</script>

</body>
</html>
